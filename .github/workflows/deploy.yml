name: Build and Deploy SN Infratech Solutions

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'sn-infratech-solutions-website' }}
  REGION: ${{ vars.GCP_REGION || 'asia-southeast1' }}
  SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'sn-infratech-solutions' }}
  ARTIFACT_REPO: ${{ vars.ARTIFACT_REPO || 'sn-infratech-website' }}
  IMAGE_NAME: sn-infratech-solutions

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          missing=()

          if [ -z "${GCP_CREDENTIALS}" ]; then
            missing+=("GCP_CREDENTIALS")
          fi

          if [ -z "${VITE_GOOGLE_SCRIPT_URL}" ]; then
            missing+=("VITE_GOOGLE_SCRIPT_URL")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Set these repository secrets (Settings -> Secrets and variables -> Actions): ${missing[*]}"
            exit 1
          fi
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          VITE_GOOGLE_SCRIPT_URL: ${{ secrets.VITE_GOOGLE_SCRIPT_URL }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe "${ARTIFACT_REPO}" \
            --project="${PROJECT_ID}" \
            --location="${REGION}" >/dev/null 2>&1 || \
          gcloud artifacts repositories create "${ARTIFACT_REPO}" \
            --project="${PROJECT_ID}" \
            --repository-format=docker \
            --location="${REGION}" \
            --description="Docker images for SN Infratech Solutions"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          IMAGE_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${IMAGE_NAME}"
          SHA_TAG="${IMAGE_URI}:${GITHUB_SHA}"
          LATEST_TAG="${IMAGE_URI}:latest"

          docker build \
            --build-arg "VITE_GOOGLE_SCRIPT_URL=${VITE_GOOGLE_SCRIPT_URL}" \
            -t "${SHA_TAG}" \
            -t "${LATEST_TAG}" \
            .

          docker push "${SHA_TAG}"
          docker push "${LATEST_TAG}"
        env:
          VITE_GOOGLE_SCRIPT_URL: ${{ secrets.VITE_GOOGLE_SCRIPT_URL }}

      - id: deploy
        name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          timeout: 3600
          flags: --project=${{ env.PROJECT_ID }} --port=8080 --allow-unauthenticated

      - name: Deployment URL
        run: |
          echo "Website: ${{ steps.deploy.outputs.url }}"
